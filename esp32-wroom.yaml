
esphome:
  name: esp32-wroom
  on_boot:
    priority: 600
    then:
      - if:
          condition:
            switch.is_on: onboard_led
          then:
            - script.execute: blink_script

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32 Fallback Hotspot"
    password: "fallback123"

captive_portal:

logger:

api:

ota:
  platform: esphome
  password: "ota_password"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

globals:
  - id: led_blink
    type: bool
    initial_value: 'true'

output:
  - platform: gpio
    pin: GPIO2
    id: led_output
    inverted: true


# Text entity controllable from Home Assistant
text:
  - platform: template
    name: "LCD Text"
    id: lcd_text
    mode: TEXT
    optimistic: true
    initial_value: "Hello from ESP!"
    set_action:
      then:
        - lambda: |-
            id(lcd_text).publish_state(x);

# LCD 2004A character display
# I2C bus for LCD display
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  scan: true

display:
  - platform: lcd_pcf8574
    address: 0x3F
    dimensions: 20x4
    lambda: |-
      it.print(0, 0, "Text: ");
      it.print(6, 0, id(lcd_text).state.c_str());
switch:
  - platform: template
    name: "Onboard LED"
    id: onboard_led
    restore_mode: ALWAYS_ON
    lambda: |-
      return id(led_blink);
    turn_on_action:
      - globals.set:
          id: led_blink
          value: 'true'
      - script.execute: blink_script
    turn_off_action:
      - globals.set:
          id: led_blink
          value: 'false'
      - output.turn_off: led_output

script:
  - id: blink_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(led_blink);'
          then:
            - output.turn_on: led_output
            - delay: 500ms
            - output.turn_off: led_output
            - delay: 500ms
