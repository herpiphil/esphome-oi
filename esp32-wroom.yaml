
esphome:
  name: esp32-wroom
  on_boot:
    priority: 600
    then:
      - if:
          condition:
            switch.is_on: onboard_led
          then:
            - script.execute: blink_script

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32 Fallback Hotspot"
    password: "fallback123"

captive_portal:

logger:

api:

ota:
  platform: esphome
  password: "ota_password"

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

globals:
  - id: led_blink
    type: bool
    initial_value: 'true'

output:
  - platform: gpio
    pin: GPIO2
    id: led_output
    inverted: true

switch:
  - platform: template
    name: "Onboard LED"
    id: onboard_led
    restore_mode: ALWAYS_ON
    lambda: |-
      return id(led_blink);
    turn_on_action:
      - globals.set:
          id: led_blink
          value: 'true'
      - script.execute: blink_script
    turn_off_action:
      - globals.set:
          id: led_blink
          value: 'false'
      - output.turn_off: led_output

script:
  - id: blink_script
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(led_blink);'
          then:
            - output.turn_on: led_output
            - delay: 500ms
            - output.turn_off: led_output
            - delay: 500ms
